<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión - Alke Wallet</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/variables.css">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>

  <div class="aw-login-container">
    <div class="aw-login-box">
      <!-- Logo -->
      <div class="d-flex justify-content-center mb-4">
        <div class="aw-logo">
          <i class="fa-solid fa-wallet"></i>
          <span>Alke Wallet</span>
        </div>
      </div>

      <!-- LOGIN  -->
      <div id="login-view">
        <div class="text-center mb-4">
          <h4 class="fw-bold mb-1">Bienvenido de vuelta</h4>
          <p style="color: var(--aw-text-muted); font-size: 0.88rem;">Ingresa tus credenciales para acceder a tu cuenta</p>
        </div>
        
        <form id="form-login" novalidate>
          <div class="aw-input-group">
            <label for="login-email" class="aw-label">Correo Electrónico</label>
            <div class="aw-input-wrap">
              <i class="fa-regular fa-envelope aw-input-icon"></i>
              <input type="email" id="login-email" class="aw-input has-icon" placeholder="nombre@correo.com" required>
            </div>
            <div class="invalid-feedback text-danger small mt-1" id="login-email-error"></div>
          </div>
          
          <div class="aw-input-group">
            <label for="login-password" class="aw-label">Contraseña</label>
            <div class="aw-input-wrap">
              <i class="fa-solid fa-lock aw-input-icon"></i>
              <input type="password" id="login-password" class="aw-input has-icon" placeholder="••••••••" required>
            </div>
            <div class="invalid-feedback text-danger small mt-1" id="login-password-error"></div>
          </div>

          <button type="submit" class="aw-btn-primary w-100 mt-3 py-3">
            Iniciar Sesión
          </button>
        </form>

        <div class="text-center mt-4">
          <p class="small mb-0" style="color: var(--aw-text-muted);">
            ¿No tienes una cuenta? 
            <a href="#" id="toggle-register" class="aw-link-accent">Regístrate aquí</a>
          </p>
          <div class="mt-3 p-3 rounded-4 text-start" style="background: var(--aw-bg-body); border: 1px solid var(--aw-border-color);">
            <span class="fw-bold small" style="color: var(--aw-text-secondary);"><i class="fa-solid fa-circle-info me-1" style="color: var(--aw-color-primary);"></i> Acceso rápido de prueba:</span>
            <div class="small mt-1" style="color: var(--aw-text-muted);">
              <strong>Email:</strong> test@alke.com<br>
              <strong>Contraseña:</strong> 123456
            </div>
          </div>
        </div>
      </div>

      <!-- REGISTRARSE -->
      <div id="register-view" style="display: none;">
        <div class="text-center mb-4">
          <h4 class="fw-bold mb-1">Crea tu cuenta</h4>
          <p style="color: var(--aw-text-muted); font-size: 0.88rem;">Regístrate para obtener tu regalo de bienvenida</p>
        </div>
        
        <form id="form-register" novalidate>
          <div class="aw-input-group">
            <label for="register-name" class="aw-label">Nombre Completo</label>
            <div class="aw-input-wrap">
              <i class="fa-regular fa-user aw-input-icon"></i>
              <input type="text" id="register-name" class="aw-input has-icon" placeholder="Juan Pérez" required>
            </div>
            <div class="invalid-feedback text-danger small mt-1" id="register-name-error"></div>
          </div>

          <div class="aw-input-group">
            <label for="register-email" class="aw-label">Correo Electrónico</label>
            <div class="aw-input-wrap">
              <i class="fa-regular fa-envelope aw-input-icon"></i>
              <input type="email" id="register-email" class="aw-input has-icon" placeholder="nombre@correo.com" required>
            </div>
            <div class="invalid-feedback text-danger small mt-1" id="register-email-error"></div>
          </div>
          
          <div class="aw-input-group">
            <label for="register-password" class="aw-label">Contraseña</label>
            <div class="aw-input-wrap">
              <i class="fa-solid fa-lock aw-input-icon"></i>
              <input type="password" id="register-password" class="aw-input has-icon" placeholder="Min. 6 caracteres" required>
            </div>
            <div class="invalid-feedback text-danger small mt-1" id="register-password-error"></div>
          </div>

          <button type="submit" class="aw-btn-primary w-100 mt-3 py-3">
            Crear Cuenta
          </button>
        </form>

        <div class="text-center mt-4">
          <p class="small mb-0" style="color: var(--aw-text-muted);">
            ¿Ya tienes cuenta? 
            <a href="#" id="toggle-login" class="aw-link-accent">Inicia sesión aquí</a>
          </p>
        </div>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/storage.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/auth.js"></script>
</body>
</html>
