<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Alke Wallet</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/variables.css">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>

  <!-- Header -->
  <header class="aw-header">
    <div class="container d-flex justify-content-between align-items-center">
      <div class="aw-logo">
        <i class="fa-solid fa-wallet"></i>
        <span>Alke Wallet</span>
      </div>
      <div class="d-flex align-items-center gap-3">
        <div class="text-end d-none d-sm-block">
          <span class="d-block" style="font-size: 0.75rem; color: var(--aw-text-muted);">Hola,</span>
          <span class="fw-bold" style="font-size: 0.9rem;" id="user-display-name">Usuario</span>
        </div>
        <div class="aw-avatar" id="user-avatar">U</div>
      </div>
    </div>
  </header>

  <!-- Dashboard -->
  <main class="container" style="padding-top: 28px;">
    
    <!-- Balance Card -->
    <div class="aw-card primary text-center p-4 p-md-5 mb-4" style="position: relative;">
      <p class="text-uppercase small fw-bold mb-2" style="opacity: 0.8; letter-spacing: 0.08em; font-size: 0.75rem;">
        Saldo Disponible
      </p>
      <div class="aw-balance-num text-white mb-2" id="wallet-balance">$0</div>
      <p class="small mb-0" style="opacity: 0.6; font-size: 0.82rem;">
        Cta. Vista N° <span id="user-account-number">123456789</span>
      </p>
    </div>

    
    <div class="row g-3 mb-4">
      <div class="col-6">
        <a href="deposit.html" class="d-block text-decoration-none">
          <div class="aw-card hover-scale text-center p-4 mb-0">
            <div class="aw-action-icon">
              <i class="fa-solid fa-arrow-down-long"></i>
            </div>
            <span class="fw-bold small d-block" style="color: var(--aw-text-main);">Depositar dinero</span>
          </div>
        </a>
      </div>
      <div class="col-6">
        <a href="sendmoney.html" class="d-block text-decoration-none">
          <div class="aw-card hover-scale text-center p-4 mb-0">
            <div class="aw-action-icon">
              <i class="fa-solid fa-paper-plane"></i>
            </div>
            <span class="fw-bold small d-block" style="color: var(--aw-text-main);">Enviar dinero</span>
          </div>
        </a>
      </div>
    </div>

    <!-- Transacciones Recientes -->
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h5 class="aw-section-title mb-0">Movimientos Recientes</h5>
      <a href="transactions.html" class="aw-link-accent small">Ver todo <i class="fa-solid fa-arrow-right ms-1" style="font-size: 0.7rem;"></i></a>
    </div>

    <div class="aw-transaction-list mb-4" id="recent-transactions-container">
      <div class="text-center py-4" id="no-transactions-placeholder" style="display: none; color: var(--aw-text-muted);">
        <i class="fa-solid fa-receipt d-block mb-2" style="font-size: 2rem; opacity: 0.4;"></i>
        <span class="small">Aún no tienes transacciones realizadas.</span>
      </div>
    </div>
  </main>

  <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/storage.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/menu.js"></script>
</body>
</html>
