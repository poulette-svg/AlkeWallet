<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cargando... - Alke Wallet</title>

  <!-- Google Fonts - Plus Jakarta Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">

  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom Design Tokens and Styles -->
  <link rel="stylesheet" href="assets/css/variables.css">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>

<body>

  <div class="d-flex flex-column align-items-center justify-content-center"
    style="min-height: 100vh; background-color: var(--aw-bg-body);">
    <div class="text-center">
      <div class="aw-logo mb-4 justify-content-center">
        <i class="fa-solid fa-wallet"></i>
        <span>Alke Wallet</span>
      </div>
      <div class="spinner-border" style="color: var(--aw-color-primary); width: 3rem; height: 3rem;" role="status">
        <span class="visually-hidden">Cargando...</span>
      </div>
      <p class="text-muted mt-3 small">Verificando sesión, por favor espera...</p>
    </div>
  </div>

  <script src="assets/js/storage.js"></script>
  <script src="assets/js/app.js"></script>
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => {
        const user = WalletStorage.getCurrentUser();
        if (user) {
          window.location.href = 'menu.html';
        } else {
          window.location.href = 'login.html';
        }
      }, 500);
    });
  </script>
</body>

</html>
